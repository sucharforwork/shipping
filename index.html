<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SUCHAR CARGO</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f3f4f6; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="appFrame"></iframe>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzzAgwLAYEfOmz_4xO2kcK7_vqNVEecNe5qFokPkvf12RNmjOcH2FhfosXmMANX--eDmA/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        
        if (!urlParams.has('page')) {
            urlParams.set('page', 'index');
        }
        
        document.getElementById('appFrame').src = GAS_WEB_APP_URL + "?" + urlParams.toString();
    </script>
</body>
</html>
